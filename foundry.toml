[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "scripts"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.20"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
appswap = "http://localhost:8545"
initia_testnet = "https://json-rpc.testnet.initia.xyz"

[etherscan]
appswap = { key = "no-key-needed", url = "http://localhost:8545" }

[fuzz]
runs = 1000
